name: Release

# Cutting a release: push a tag like `v0.1.1-pre.0` and this workflow verifies
# the build, then creates a matching GitHub Release. Tags containing a hyphen
# (e.g. `-pre.0`, `-beta.1`) are published as pre-releases.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          PRERELEASE=""
          case "$TAG" in
            *-*) PRERELEASE="--prerelease" ;;
          esac
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $PRERELEASE
