name: ResearchDesk release

# Cutting a release: push a tag like `v0.1.2-pre.0`. This verifies the build,
# packages the Windows x64 desktop binary, packages headless MCP bundles for
# Linux/Windows/macOS, and publishes a matching GitHub release. Tags containing a
# hyphen (e.g. `-pre.0`, `-beta.1`) are published as pre-releases.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  checks:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  desktop-windows:
    name: Build Windows portable desktop
    runs-on: windows-latest
    needs: checks

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build Windows binary
        run: npm run desktop:dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: researchdesk-desktop-windows-x64
          path: dist/ResearchDesk-*-windows-x64.exe
          if-no-files-found: error

  headless:
    name: Build headless bundle (${{ matrix.target }})
    needs: checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            archive: tar
          - os: windows-latest
            target: windows-x64
            archive: zip
          - os: macos-13
            target: darwin-x64
            archive: tar
          - os: macos-14
            target: darwin-arm64
            archive: tar

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build app
        run: npm run build

      - name: Build headless bundle
        run: npm run headless:bundle
        env:
          RESEARCHDESK_BUNDLE_TARGET: ${{ matrix.target }}

      - name: Archive headless bundle
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          tar -C dist/headless -czf "dist/ResearchDesk-Headless-${VERSION}-${{ matrix.target }}.tar.gz" "ResearchDesk-Headless-${VERSION}-${{ matrix.target }}"

      - name: Archive headless bundle
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          Compress-Archive -Path "dist/headless/ResearchDesk-Headless-$version-${{ matrix.target }}/*" -DestinationPath "dist/ResearchDesk-Headless-$version-${{ matrix.target }}.zip"

      - name: Upload headless artifact
        uses: actions/upload-artifact@v4
        with:
          name: researchdesk-headless-${{ matrix.target }}
          path: |
            dist/ResearchDesk-Headless-*.tar.gz
            dist/ResearchDesk-Headless-*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - desktop-windows
      - headless

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release-artifacts/*
          body: |
            ResearchDesk ${{ github.ref_name }}.

            Artifacts:
            - Windows x64 portable desktop app
            - Headless + MCP bundles for Linux x64, Windows x64, macOS x64, and macOS arm64

            This is experimental research-assistance software. Verify LLM
            output, citations, calculations, prompts, and manuscript edits
            before relying on them. Do not send sensitive manuscripts or
            peer-review material to cloud providers unless you have the right
            to do so.
