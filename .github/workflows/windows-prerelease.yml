name: Windows prerelease

on:
  push:
    tags:
      - "v0.1.0-beta.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows portable binary
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build Windows binary
        run: npm run desktop:dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Reviewer-Agent-0.1.0-beta.0-windows-x64
          path: dist/Reviewer-Agent-0.1.0-beta.0-windows-x64.exe
          if-no-files-found: error

      - name: Publish GitHub prerelease
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: dist/Reviewer-Agent-0.1.0-beta.0-windows-x64.exe
          body: |
            Pre-0.1.0 closed-beta Windows build.

            This is experimental research-assistance software. Verify LLM
            output, citations, calculations, and manuscript edits before relying
            on them. Do not send sensitive manuscripts or peer-review material
            to cloud providers unless you have the right to do so.
