name: Windows release

# Cutting a release: push a tag like `v0.1.1-pre.0`. This verifies the build,
# packages the Windows x64 portable binary, and publishes a matching GitHub
# release with the binary attached. Tags containing a hyphen (e.g. `-pre.0`,
# `-beta.1`) are published as pre-releases.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Build Windows portable binary
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build Windows binary
        run: npm run desktop:dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: reviewer-agent-windows-x64
          path: dist/Reviewer-Agent-*-windows-x64.exe
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: dist/Reviewer-Agent-*-windows-x64.exe
          body: |
            Reviewer Agent ${{ github.ref_name }} — Windows x64 portable build.

            This is experimental research-assistance software. Verify LLM
            output, citations, calculations, and manuscript edits before relying
            on them. Do not send sensitive manuscripts or peer-review material
            to cloud providers unless you have the right to do so.
